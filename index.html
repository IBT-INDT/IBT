<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBT Wallet V2.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; text-align: center; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #334155; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #334155; border: 1px solid #475569; color: white; box-sizing: border-box; }
        #log { font-size: 10px; color: #22c55e; margin-top: 20px; text-align: left; background: black; padding: 10px; border-radius: 5px; height: 50px; overflow-y: auto; }
    </style>
</head>
<body>

    <h2>IBT MESH WALLET</h2>
    <p style="font-size: 0.8em; color: #94a3b8;">Decentralized P2P Network</p>

    <div class="card">
        <input type="password" id="pass" placeholder="Enter Wallet Password">
        <button onclick="createWallet()">JOIN NETWORK</button>
        <div id="addr-display" style="font-size: 10px; word-break: break-all; margin-top: 15px; color: #3b82f6;"></div>
    </div>

    <div id="log">> System Initialized...</div>

    <script>
        function log(msg) { document.getElementById('log').innerHTML += "<br>> " + msg; }

        function createWallet() {
            try {
                const pass = document.getElementById('pass').value;
                if(!pass) return alert("Password dalo!");

                const ec = new elliptic.ec('secp256k1');
                const key = ec.genKeyPair();
                const addr = key.getPublic('hex');
                
                document.getElementById('addr-display').innerText = "Your Address: " + addr;
                log("Wallet Created Successfully!");
            } catch (e) {
                log("Error: " + e.message);
                console.error(e);
            }
        }
    </script>
</body>
</html>
