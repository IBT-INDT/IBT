<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IBT Mobile Wallet</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.min.js"></script>
    <style>
        .wallet-card {
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.4), rgba(139, 92, 246, 0.3));
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--card-border);
        }
        .nav-item {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-item.active { color: var(--primary); }
        .screen { display: none; }
        .screen.active { display: block; }
        
        #qr-code {
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 20px;
        }
        .tx-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .tx-item {
            padding: 12px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container" style="padding-bottom: 100px;">
        <div id="login-screen" class="screen active">
            <div style="text-align: center; margin-top: 50px;">
                <img src="icon.png" width="80" style="border-radius: 20px; margin-bottom: 20px;" alt="Logo">
                <h1 class="gradient-text">IBT Wallet</h1>
                <p style="color: var(--text-dim);">The Future of P2P Money</p>
                <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 15px;">
                    <button class="btn btn-primary" id="btn-create">Create New Wallet</button>
                    <button class="btn btn-outline" id="btn-login">Login with Existing</button>
                    <textarea id="mnemonic" style="background: var(--card-bg); color: white; border: 1px solid var(--card-border); border-radius: 10px; padding: 10px; font-size: 0.8rem; width: 100%; display: none;"></textarea>
                </div>
            </div>
        </div>

        <div id="wallet-screen" class="screen">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <div>
                    <p style="color: var(--text-dim); font-size: 0.9rem;">Total Balance</p>
                    <h1 id="balance-val" style="font-size: 2.2rem;">0 IBT</h1>
                </div>
                <div class="status-badge" id="net-status">P2P Live</div>
            </header>

            <div class="wallet-card animate-fade">
                <p style="font-size: 0.8rem; opacity: 0.7;">Your Public ID</p>
                <p id="my-pub" style="font-size: 0.7rem; color: var(--primary); word-break: break-all; cursor: pointer; margin-top: 5px;">Click to copy address</p>
            </div>

            <div class="tx-list" id="tx-history">
                <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 10px;">Recent Activity</p>
            </div>
        </div>

        <div id="send-screen" class="screen">
            <h1 class="gradient-text" style="margin-top: 20px;">Send IBT</h1>
            <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 20px;">
                <input type="text" id="send-to" placeholder="Recipient Public ID">
                <input type="number" id="send-amount" placeholder="Amount">
                <button class="btn btn-primary" id="btn-confirm-send">Confirm Transfer</button>
                <button class="btn btn-outline" onclick="showScreen('wallet-screen')">Cancel</button>
            </div>
        </div>

        <div id="receive-screen" class="screen" style="text-align: center;">
            <h1 class="gradient-text" style="margin-top: 20px;">Receive IBT</h1>
            <p style="color: var(--text-dim); margin-top: 10px;">Share this QR to receive payments</p>
            <div id="qr-code"></div>
            <p id="receive-pub" style="font-size: 0.7rem; color: var(--primary); word-break: break-all; margin-top: 15px; padding: 10px; border: 1px dashed var(--card-border); border-radius: 10px;"></p>
            <button class="btn btn-primary" style="margin-top: 30px; width: 100%;" onclick="copyAddr()">Copy Address</button>
        </div>

        <nav class="nav-bar" id="mobile-nav" style="display: none;">
            <a href="#" class="nav-item active" onclick="showScreen('wallet-screen')">
                <span>🏠</span> Home
            </a>
            <a href="#" class="nav-item" onclick="showScreen('send-screen')">
                <span>💸</span> Send
            </a>
            <a href="#" class="nav-item" onclick="showScreen('receive-screen')">
                <span>📥</span> Receive
            </a>
        </nav>
    </div>

    <script>
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://peer.wall.gl/gun',
            'https://gundb.herokuapp.com/gun'
        ]);
        const sea = SEA;
        let user = gun.user();
        let myPair = null;

        // Routing
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Nav visibility
            document.getElementById('mobile-nav').style.display = id === 'login-screen' ? 'none' : 'flex';
            
            // Generate QR if receive
            if (id === 'receive-screen') {
                const qr = qrcode(0, 'M');
                qr.addData(myPair.pub);
                qr.make();
                document.getElementById('qr-code').innerHTML = qr.createImgTag(6);
                document.getElementById('receive-pub').innerText = myPair.pub;
            }
        }

        async function createWallet() {
            myPair = await sea.pair();
            localStorage.setItem('ibt_wallet_pair', JSON.stringify(myPair));
            finishLogin();
        }

        function finishLogin() {
            user.auth(myPair, (ack) => {
                if (ack.err) {
                    alert("Auth error: " + ack.err);
                    return;
                }
                document.getElementById('my-pub').innerText = myPair.pub;
                showScreen('wallet-screen');
                initWallet();
            });
        }

        async function initWallet() {
            // Load balance
            user.get('ibt').get('balance').on(val => {
                document.getElementById('balance-val').innerText = (val || 0).toLocaleString() + " IBT";
            });

            // Listen for transfers to me
            gun.get('ibt_v1').get('transfers').map().on(async (tx, id) => {
                if (tx && tx.to === myPair.pub && !tx.processed) {
                    // Check if we already processed this tx in local history
                    let history = await user.get('ibt_v1').get('history').get(id).then();
                    if (!history) {
                        const current = await user.get('ibt').get('balance').then() || 0;
                        user.get('ibt').get('balance').put(current + tx.amount);
                        user.get('ibt_v1').get('history').get(id).put(tx);
                        addTxLog(tx);
                    }
                }
            });
        }

        function addTxLog(tx) {
            const list = document.getElementById('tx-history');
            const div = document.createElement('div');
            div.className = 'tx-item';
            div.style.flexDirection = 'column';
            div.style.alignItems = 'flex-start';
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <span>${tx.amount} IBT</span>
                    <span style="opacity: 0.5;">From: ${tx.from.substring(0,6)}...</span>
                </div>
                <div style="font-size: 0.6rem; color: var(--accent); opacity: 0.5; margin-top: 4px;">
                    Parent: ${tx.parent || 'none'}
                </div>
            `;
            list.prepend(div);
        }

        document.getElementById('btn-confirm-send').onclick = async () => {
            const dest = document.getElementById('send-to').value;
            const amount = parseFloat(document.getElementById('send-amount').value);
            const current = await user.get('ibt').get('balance').then() || 0;

            if (current < amount) return alert("Low balance");

            // DAG Logic: Link to the current network tip
            const parentId = await gun.get('ibt_v1').get('last_tx').then() || 'genesis';
            const txId = 'tx_' + Math.random().toString(36).substring(7);

            // Broadcast transfer
            gun.get('ibt_v1').get('transfers').get(txId).put({
                from: myPair.pub,
                to: dest,
                amount: amount,
                parent: parentId,
                time: Date.now()
            });

            // Update local balance
            user.get('ibt').get('balance').put(current - amount);
            
            // Update network tip
            gun.get('ibt_v1').get('last_tx').put(txId);

            showScreen('wallet-screen');
        };

        function copyAddr() {
            navigator.clipboard.writeText(myPair.pub);
            alert("Address copied!");
        }

        document.getElementById('btn-create').onclick = createWallet;
        
        // Auto-login
        const saved = localStorage.getItem('ibt_wallet_pair');
        if (saved) {
            myPair = JSON.parse(saved);
            finishLogin();
        }

        // Service Worker Reg
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
