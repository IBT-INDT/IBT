<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBT Wallet</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .wallet-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; margin-top: 20px; }
        .bal { font-size: 3rem; color: #00ff88; font-weight: bold; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; background: #222; color: #fff; border: 1px solid #444; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #007bff; color: #fff; font-weight: bold; font-size: 1rem; }
        #addr { font-size: 10px; color: #666; word-break: break-all; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="wallet-card">
        <h2>IBT Wallet</h2>
        <div class="bal"><span id="user-bal">0</span></div>
        <div id="addr">Loading Wallet...</div>
        <hr style="border:0.5px solid #222; margin: 20px 0;">
        <input type="text" id="to" placeholder="Receiver Address">
        <input type="number" id="amt" placeholder="Amount">
        <button onclick="send()">SEND IBT</button>
    </div>

    <script>
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const sea = Gun.SEA;
        let pair;

        async function start() {
            let saved = localStorage.getItem('ibt_key');
            pair = saved ? JSON.parse(saved) : await sea.pair();
            if(!saved) localStorage.setItem('ibt_key', JSON.stringify(pair));
            
            document.getElementById('addr').innerText = pair.pub;
            gun.get('ibt_balances').get(pair.pub).on(b => document.getElementById('user-bal').innerText = b || 0);
        }

        async function send() {
            const to = document.getElementById('to').value;
            const amount = document.getElementById('amt').value;
            const tx = { from: pair.pub, to, amount, time: Date.now() };
            const sig = await sea.sign(tx, pair);
            gun.get('ibt_network').get('transactions').set({ data: tx, sig, pub: pair.pub });
            alert("Sent!");
        }

        if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        start();
    </script>
</body>
</html>
